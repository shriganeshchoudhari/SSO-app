quarkus.http.port=${HTTP_PORT:7070}
quarkus.http.auth.proactive=false
quarkus.http.limits.max-form-attribute-size=64K

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/openid}
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.hibernate-orm.database.generation=none

quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

quarkus.smallrye-openapi.info-title=OpenIdentity Admin API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Admin and Protocol endpoints for OpenIdentity MVP
quarkus.smallrye-openapi.info-contact-name=OpenIdentity Team
quarkus.smallrye-openapi.info-contact-email=team@openidentity.local
quarkus.smallrye-openapi.info-license-name=Apache-2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# JWT signing (HS256) — set via environment, no defaults committed
smallrye.jwt.sign.key=${JWT_SIGN_KEY:}
smallrye.jwt.sign.key.algorithm=${JWT_SIGN_ALG:HS256}
mp.jwt.verify.issuer=${JWT_ISSUER:http://localhost:7070}
openidentity.jwt.private-key-pem=${OPENIDENTITY_JWT_PRIVATE_KEY_PEM:}
openidentity.jwt.public-key-pem=${OPENIDENTITY_JWT_PUBLIC_KEY_PEM:}
openidentity.jwt.key-id=${OPENIDENTITY_JWT_KEY_ID:openidentity-rs256}

quarkus.log.console.json=true

# OpenTelemetry tracing
# Set OTEL_EXPORTER_OTLP_ENDPOINT to your collector (e.g. http://otel-collector:4317).
# Tracing is disabled when the endpoint is blank (default for local dev).
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${OTEL_SERVICE_NAME:openidentity-auth}
quarkus.otel.resource.attributes=deployment.environment=${DEPLOYMENT_ENV:local}
# Propagate W3C trace context headers across HTTP boundaries
quarkus.otel.propagators=tracecontext,baggage

# Rate limiting (token endpoint)
# When REDIS_URL is set the rate limiter uses Redis INCR+EXPIRE for shared HA state.
# Without Redis it falls back to the in-memory per-process counter (suitable for single-node only).
openidentity.rate-limit.token.enabled=${OPENIDENTITY_RATE_LIMIT_TOKEN_ENABLED:true}
openidentity.rate-limit.token.rpm=${OPENIDENTITY_RATE_LIMIT_TOKEN_RPM:60}
openidentity.rate-limit.redis-enabled=${OPENIDENTITY_RATE_LIMIT_REDIS_ENABLED:false}

# Redis — optional; leave blank to disable (falls back to in-memory rate limiting)
quarkus.redis.hosts=${REDIS_URL:redis://127.0.0.1:6379}
quarkus.redis.timeout=2s

# Session
session.idle-timeout-seconds=${SESSION_IDLE_TIMEOUT_SECONDS:1800}
openidentity.admin.bootstrap-token=${OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN:}
openidentity.secret-protection.key=${OPENIDENTITY_SECRET_PROTECTION_KEY:}
