quarkus.http.port=0
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0
quarkus.http.auth.proactive=false
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.database.generation=none
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

smallrye.jwt.sign.key=0123456789abcdef0123456789abcdef
smallrye.jwt.sign.key.algorithm=HS256
mp.jwt.verify.issuer=http://localhost:7070

# Tests need access to security tokens
openidentity.dev.return-tokens=true
openidentity.admin.bootstrap-token=test-bootstrap-token
