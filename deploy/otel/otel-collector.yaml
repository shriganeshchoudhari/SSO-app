# OpenTelemetry Collector configuration for OpenIdentity local dev.
# In production replace the logging exporter with your backend
# (Jaeger, Tempo, Datadog, Honeycomb, etc.).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Prints spans to stdout — replace with your tracing backend for production.
  debug:
    verbosity: normal
  # Uncomment and configure one of the following for production:
  # jaeger:
  #   endpoint: http://jaeger:14250
  # otlp/tempo:
  #   endpoint: http://tempo:4317
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [debug]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
