apiVersion: v1
kind: Secret
metadata:
  name: openidentity-secrets
  namespace: openidentity
type: Opaque
stringData:
  # Override every value below with real secrets before deploying.
  DB_PASSWORD: "change-me"
  OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN: "change-me"
  OPENIDENTITY_SECRET_PROTECTION_KEY: "change-me"
  # Leave blank to auto-generate RS256 key on first boot (persisted to DB).
  OPENIDENTITY_JWT_PRIVATE_KEY_PEM: ""
  OPENIDENTITY_JWT_PUBLIC_KEY_PEM: ""
