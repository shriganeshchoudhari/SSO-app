apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: openidentity
  labels:
    app: auth-server
    app.kubernetes.io/name: openidentity
    app.kubernetes.io/component: auth-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: "7070"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-server
          image: openidentity/auth-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7070
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openidentity-config
            - secretRef:
                name: openidentity-secrets
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 7070
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 7070
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
