apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openidentity-auth
  namespace: openidentity
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: identity.example.com      # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openidentity-auth
                port:
                  name: http
  tls:
    - hosts:
        - identity.example.com
      secretName: openidentity-tls
