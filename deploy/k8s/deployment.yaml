apiVersion: apps/v1
kind: Deployment
metadata:
  name: openidentity-auth
  namespace: openidentity
  labels:
    app: openidentity-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openidentity-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openidentity-auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: "7070"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-server
          image: openidentity/auth-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7070
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openidentity-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: DB_PASSWORD
            - name: OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN
            - name: OPENIDENTITY_SECRET_PROTECTION_KEY
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: OPENIDENTITY_SECRET_PROTECTION_KEY
            - name: OPENIDENTITY_JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: OPENIDENTITY_JWT_PRIVATE_KEY_PEM
            - name: OPENIDENTITY_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: OPENIDENTITY_JWT_PUBLIC_KEY_PEM
            - name: REDIS_URL
              value: "redis://openidentity-redis:6379"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 7070
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 7070
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
