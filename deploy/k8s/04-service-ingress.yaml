apiVersion: v1
kind: Service
metadata:
  name: auth-server-svc
  namespace: openidentity
  labels:
    app: auth-server
spec:
  selector:
    app: auth-server
  ports:
    - name: http
      port: 80
      targetPort: 7070
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-server-ingress
  namespace: openidentity
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: identity.example.com   # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-server-svc
                port:
                  number: 80
  tls:
    - hosts:
        - identity.example.com
      secretName: openidentity-tls
