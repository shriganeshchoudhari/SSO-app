apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openidentity-postgres
  namespace: openidentity
spec:
  serviceName: openidentity-postgres
  replicas: 1
  selector:
    matchLabels:
      app: openidentity-postgres
  template:
    metadata:
      labels:
        app: openidentity-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: openid
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openidentity-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "openid"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openidentity-postgres
  namespace: openidentity
spec:
  selector:
    app: openidentity-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
