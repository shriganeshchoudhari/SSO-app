apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openidentity-redis
  namespace: openidentity
spec:
  serviceName: openidentity-redis
  replicas: 1
  selector:
    matchLabels:
      app: openidentity-redis
  template:
    metadata:
      labels:
        app: openidentity-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openidentity-redis
  namespace: openidentity
spec:
  clusterIP: None
  selector:
    app: openidentity-redis
  ports:
    - port: 6379
      targetPort: 6379
