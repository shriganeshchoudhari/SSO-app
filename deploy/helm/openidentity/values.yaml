replicaCount: 2

image:
  repository: openidentity/auth-server
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 7070

ingress:
  enabled: true
  className: nginx
  host: identity.example.com
  tlsSecretName: openidentity-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Auth server config
config:
  httpPort: "7070"
  sessionIdleTimeoutSeconds: "1800"

# Database
postgres:
  enabled: true          # set false to use an external DB
  image: postgres:16-alpine
  storage: 10Gi
  database: openid
  username: postgres

# Secrets — override via --set or an external secret manager
secrets:
  dbPassword: "change-me"
  adminBootstrapToken: "change-me"
  secretProtectionKey: "change-me"
  jwtPrivateKeyPem: ""
  jwtPublicKeyPem: ""

# Prometheus scraping
metrics:
  enabled: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
