apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openidentity.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openidentity.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openidentity.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "openidentity.selectorLabels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: {{ .Values.config.httpPort | quote }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.httpPort | int }}
          envFrom:
            - configMapRef:
                name: {{ include "openidentity.fullname" . }}-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "openidentity.fullname" . }}-secrets
                  key: DB_PASSWORD
            - name: OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openidentity.fullname" . }}-secrets
                  key: OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN
            - name: OPENIDENTITY_SECRET_PROTECTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openidentity.fullname" . }}-secrets
                  key: OPENIDENTITY_SECRET_PROTECTION_KEY
            - name: OPENIDENTITY_JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "openidentity.fullname" . }}-secrets
                  key: OPENIDENTITY_JWT_PRIVATE_KEY_PEM
            - name: OPENIDENTITY_JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "openidentity.fullname" . }}-secrets
                  key: OPENIDENTITY_JWT_PUBLIC_KEY_PEM
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: {{ .Values.config.httpPort | int }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: {{ .Values.config.httpPort | int }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
