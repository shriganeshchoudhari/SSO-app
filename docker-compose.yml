version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: openidentity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openid"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openidentity-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7070:7070"
    environment:
      DB_KIND: postgresql
      DB_URL: jdbc:postgresql://postgres:5432/openid
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      HTTP_PORT: "7070"
      # Generate a strong random value for production:
      OPENIDENTITY_ADMIN_BOOTSTRAP_TOKEN: "change-me-in-production"
      OPENIDENTITY_SECRET_PROTECTION_KEY: "change-me-in-production"
      # Leave blank to auto-generate RS256 key on first boot (persisted to DB):
      OPENIDENTITY_JWT_PRIVATE_KEY_PEM: ""
      OPENIDENTITY_JWT_PUBLIC_KEY_PEM: ""
      # Redis for shared rate-limit state across replicas:
      REDIS_URL: "redis://redis:6379"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7070/q/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  admin-ui:
    build:
      context: admin-ui
      dockerfile: Dockerfile
    container_name: openidentity-admin-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-server

  account-ui:
    build:
      context: account-ui
      dockerfile: Dockerfile
    container_name: openidentity-account-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - auth-server

  redis:
    image: redis:7-alpine
    container_name: openidentity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: openidentity-otel
    restart: unless-stopped
    volumes:
      - ./deploy/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Collector metrics
    depends_on:
      - auth-server

volumes:
  pgdata:
